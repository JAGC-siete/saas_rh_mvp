<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generar Planilla</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="container">
    <div class="form-container">
      <h1>Sistema de Nómina</h1>
      <div class="input-group">
        <label for="usuario">Usuario</label>
        <input id="usuario" placeholder="Ingrese su usuario" required />
      </div>
      <div class="input-group">
        <label for="password">Contraseña</label>
        <input id="password" placeholder="Ingrese su contraseña" type="password" required />
      </div>
      <button onclick="login()" class="btn-primary">Iniciar sesión</button>
      <p id="status" class="message"></p>
    </div>
  </div>
  <script>
    // Configuración de la API
    const API_BASE_URL = window.location.origin;
    
    // Check if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = '/planilla.html';
    }

    // Verificar conectividad del servidor
    async function checkServerHealth() {
      try {
        const res = await fetch(`${API_BASE_URL}/health`);
        const data = await res.json();
        if (!res.ok || data.status !== 'healthy') {
          throw new Error(data.error || 'Servicio no disponible');
        }
        return true;
      } catch (err) {
        document.getElementById('status').className = 'message error';
        document.getElementById('status').innerText = '❌ Error de conexión al servidor';
        return false;
      }
    }

    // Verificar salud del servidor al cargar la página
    checkServerHealth();
  
    async function login() {
      const usuario = document.getElementById('usuario').value;
      const password = document.getElementById('password').value;
      const status = document.getElementById('status');
  
      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario, password })
        });
  
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.token);
          status.className = 'message success';
          status.innerText = '✅ Login exitoso. Redirigiendo...';
          setTimeout(() => window.location.href = '/planilla.html', 1000);
        } else {
          status.className = 'message error';
          status.innerText = '❌ ' + (data.error || 'Usuario o contraseña incorrectos');
        }
      } catch (err) {
        status.className = 'message error';
        status.innerText = '❌ Error de conexión al servidor';
      }
    }
  
    async function generarPlanilla() {
      const periodo = document.getElementById('periodo').value;
      const quincena = document.getElementById('quincena').value;
      const status = document.getElementById('status');
  
      try {
        const res = await fetch(`${BASE_URL}/planilla`, {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ periodo, quincena })
        });
  
        if (res.ok) {
          const blob = await res.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `planilla_${periodo}_q${quincena}.pdf`;
          a.click();
          status.className = 'message success';
          status.innerText = '✅ Planilla generada con éxito.';
        } else {
          const error = await res.json();
          status.className = 'message error';
          status.innerText = '❌ ' + (error.error || 'Error al generar.');
          status.style.color = 'red';
        }
      } catch (err) {
        status.innerText = '❌ Error de conexión.';
        status.style.color = 'red';
      }
    }
  </script>  
</body>
</html>
