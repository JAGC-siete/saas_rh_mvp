[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Deja que el Dockerfile defina CMD, o usa uno solo de estos dos (no ambos).
# startCommand = "node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
numReplicas = 1

[variables]
# Público/operativo (OK en repo)
TZ = "America/Tegucigalpa"
NODE_ENV = "production"
PORT = "8080"
HOSTNAME = "0.0.0.0"
NEXT_TELEMETRY_DISABLED = "1"
DEFAULT_CURRENCY = "HNL"
DEFAULT_TIMEZONE = "America/Tegucigalpa"
SKIP_ENV_VALIDATION = "false"

# Estas NO van en el repo. Configúralas en Railway Dashboard:
# NEXT_PUBLIC_SUPABASE_URL
# NEXT_PUBLIC_SUPABASE_ANON_KEY
# SUPABASE_SERVICE_ROLE_KEY
# DATABASE_URL
# SUPABASE_JWT_SECRET
# SESSION_SECRET

[railway]
serviceType = "web"