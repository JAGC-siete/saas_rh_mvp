apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrations
  namespace: humanosisu
spec:
  ttlSecondsAfterFinished: 600  # Automatically delete job 10 minutes after completion
  template:
    metadata:
      labels:
        app: db-migrations
    spec:
      containers:
      - name: db-migrations
        image: ${ECR_REGISTRY}/db-migrations:${IMAGE_TAG}
        command: ["npm", "run", "migrate"]
        env:
        - name: NODE_ENV
          value: production
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: host
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: dbname
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
