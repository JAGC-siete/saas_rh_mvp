apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: humanosisu
data:
  # Common configuration
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  ENVIRONMENT: "${ENVIRONMENT}"
  
  # Service endpoints
  API_URL: "https://api.humanosisu.com"
  ASISTENCIA_URL: "https://asistencia.humanosisu.com"
  NOMINA_URL: "https://nomina.humanosisu.com"
  
  # Feature flags
  ENABLE_ANALYTICS: "true"
  ENABLE_NOTIFICATIONS: "true"
  
  # AWS region for client-side services
  AWS_REGION: "us-east-1"
